<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>

  <!-- Link CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Link JS -->
  <<script type="module" src="script.js" defer></script>  >
</head>
<body>
  <button id="settings-btn" class="settings-button">Settings</button>

  <div id="settings-panel" class="settings-panel hidden">
    <h3>Calculator Settings</h3>

    <label for="angle-mode-select">Angle Mode:</label>
    <select id="angle-mode-select">
      <option value="deg">Degrees</option>
      <option value="rad">Radians</option>
    </select>

    <label for="calc-mode-select">Calculator Mode:</label>
    <select id="calc-mode-select">
      <option value="standard">Standard</option>
      <option value="scientific">Scientific</option>
    </select>

    <label for="theme-select">Theme:</label>
    <select id="theme-select">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="contrast">High Contrast</option>
    </select>

    <button id="save-settings-btn" class="save-btn">Save Settings</button>
  </div>
  <div class="container">
    <h1 class="title">Maria's Calculator</h1>
    
    <nav class="breadcrumb">
      <button class="breadcrumb-btn active" data-mode="standard">
        <span class="breadcrumb-icon">📱</span>
        <span>Standard</span>
      </button>
      <button class="breadcrumb-btn" data-mode="scientific">
        <span class="breadcrumb-icon">🔬</span>
        <span>Scientific</span>
      </button>
    </nav>

    <div class="calculator-wrapper">
      <span class="flower-left">🌼</span>
      <div id="calculator" data-mode="standard">
        <input type="text" id="display" disabled />

        <div id="buttons" class="standard-mode">
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button class="operator">/</button>

          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button class="operator">*</button>

          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button class="operator">-</button>

          <button>0</button>
          <button>.</button>
          <button class="equals">=</button>
          <button class="operator">+</button>

          <button class="clear">C</button>
          <button class="clear">CE</button>
          <button class="operator">%</button>
          <button class="operator">√</button>
        </div>

        <div id="buttons" class="scientific-mode" style="display: none;">
          <button class="function">sin</button>
          <button class="function">cos</button>
          <button class="function">tan</button>
          <button class="operator">/</button>

          <button class="function">log</button>
          <button class="function">ln</button>
          <button class="function">x²</button>
          <button class="operator">*</button>

          <button class="function">x^y</button>
          <button class="function">√</button>
          <button class="function">∛</button>
          <button class="operator">-</button>

          <button class="function">π</button>
          <button class="function">e</button>
          <button class="function">(</button>
          <button class="function">)</button>

          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button class="operator">+</button>

          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button class="function">1/x</button>

          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button class="function">!</button>

          <button>0</button>
          <button>.</button>
          <button class="equals">=</button>
          <button class="clear">C</button>

          <button class="clear">CE</button>
          <button class="operator">%</button>
          <button class="function">deg</button>
          <button class="function">rad</button>
        </div>
      </div>
      <span class="flower-right">🌼</span>
    </div>
  </div>
</body>
</html>
